name: typing

services:
  backend:
    image: ghcr.io/<你的仓库>/typing-test-backend:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    volumes:
      - typing-data:/data
    networks:
      - typing-net

  frontend:
    image: ghcr.io/<你的仓库>/typing-test-frontend:latest
    restart: unless-stopped
    ports:
      - "443:443"
    depends_on:
      - backend
    networks:
      - typing-net

volumes:
  typing-data:

networks:
  typing-net:
