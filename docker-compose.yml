name: typing

services:
  backend:
    image: ghcr.io/hbpc002/typing-test-backend:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    volumes:
      - typing-data:/data
    networks:
      - typing-net

  frontend:
    image: ghcr.io/hbpc002/typing-test-frontend:latest
    restart: unless-stopped
    ports:
      - "443:443"
    depends_on:
      - backend
    # 挂载主机 ./ssl 目录到容器 /etc/nginx/ssl，:rw 让容器内 generate-cert.sh
    # 能在证书缺失时写入自签证书。如需使用自有证书，把 typing.crt / typing.key
    # 放到主机 ./ssl 目录里，generate-cert.sh 会跳过生成直接复用。
    volumes:
      - ./ssl:/etc/nginx/ssl:rw
    networks:
      - typing-net

volumes:
  typing-data:

networks:
  typing-net:
