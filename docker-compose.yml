name: typing

services:
  backend:
    build: ./server
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - typing-data:/data
    networks:
      - typing-net

  frontend:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "443:443"
    depends_on:
      - backend
    networks:
      - typing-net

volumes:
  typing-data:

networks:
  typing-net:
